body:
  text: 跋霍亂非怪證也然而倉卒變端醫藥輒誤則霍亂之不怪而怪較諸怪證而尤為怪也惟是霍亂醫者都以熱證為寒證而治以熱藥至死終不一悟此則不獨證之怪而醫亦無不怪矣醫藥之怪更怪於霍亂之怪霍亂用醫藥誤治而成怪而醫藥在在皆然不自以為怪而怪乃錮矣於是霍亂之無所為怪而遂成怪證怪何能知怪亦可燭此季父作霍亂燃犀說之由來也昔溫大真燃犀以照水怪歷歷可數雖醫藥霍亂之怪非水之怪也然讀是說則屬寒屬熱絕無混淆胸有成竹不使霍亂之遁形變相不致醫藥之視赤成碧豈非怪而不怪設或霍亂之有怪醫藥之怪人能盡悉其怪而怪肯化為不怪是說奚翅燃犀之明僅照水怪哉戊子夏日從子玉林百拜謹跋於崑山隱園之寓廬
