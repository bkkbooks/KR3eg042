body:
  text: 卷下客有見前編而謂曰子於霍亂之熱證固屬引古證今述而不作辨訛異別義已無餘矣然則寒霍亂百不得一之說苟一遇之將何施治盍再以寒霍亂病證方藥詳細述之俾獲見其說屬熱屬寒瞭如指掌矣余即將寒霍亂之原由併成方又縷述焉經云歲土不及民病飧泄霍亂夫歲土不及則脾胃素虛之人因天運而更見其虛中陽既虛寒濕自盛以致朝食暮瀉而為飧泄甚加嘔吐而為霍亂觀其與飧泄並稱則知利者必是清穀而非臭穢吐者亦必澄徹而非酸濁小便之利口之不渴又從而可必矣如此才是寒濕霍亂可以理中湯之類治之故讀書須以意逆其理自然觸處洞然無往而不貫矣且寒霍亂多見於安逸之人以共深居靜處陽氣不伸加以坐臥風涼起居任意冰瓜雪藕恣食為常雖在盛夏之時原不可謂之暑病王安道論之詳矣輕則藿香正氣散或平胃散加木香藿香生薑半夏之類濕盛而四肢重著骨節煩疼者胃苓湯加木香藿香大腹皮之類七情鬱結寒食停滯者七香飲頭疼惡寒無汗者以香藿飲先解其表隨以大順散等調其里如果脈弱陽虛腹痛喜得溫按瀉出不臭者來復丹若吐瀉不止坐氣耗散或水粒不入或口渴喜冷而不多飲或惡寒戰栗手足逆逆或煩熱發躁揭去衣被但察其瀉出不臭者乃內虛陰盛格陽宜理中湯甚則四逆湯加食鹽少許更有暴瀉如水冷汗四逆脈弱不能言者急進漿水散救之並宜冷服然此輩實由避暑而反為寒傷致病若誤投清暑之劑而更助其陰則頃刻亡陽莫挽矣世治此病而愈者猶未確識其為寒也送謂夏月暑病通宜溫熱噫自家錯認面目而欲專信後人何異癡人說夢耶瀛按治寒霍亂亦必首察其厥陰之動靜倘其人肝陰素虧內風暗動者姜附等極宜慎用即當用亦須妥為駕馭蓋雖系中焦土病然土病木必侮之設使過劑雖不似熱霍亂之即為害亦必增劇而纏綿難愈傷寒論云吐利汗出發熱惡寒四肢拘急手足厥逆者四逆湯主之此陽虛之體寒邪得以直入而為霍亂也發熱惡寒者身雖熱而惡寒有熱為格陽之假象惡寒為虛冷之真諦也四肢拘急手足厥逆者陽氣衰少不柔於筋不溫於四末也首重汗出者為陽有外去之象故徑用四逆湯祛其既入之寒而挽其將去之陽若止見厥逆惡寒四肢拘急脈來沉細弦緊面如塵土瀉出不臭雖屬陰寒而無汗出之候者但宜冷香飲子治之寒主收引故四肢拘急乃筋強不能屈伸之謂與熱症之轉筋迥別臨診極宜分辨苟或穎倒誤施禍成反掌又云既吐且利小便復利而大汗出下利清穀內寒外熱脈微欲絶者四逆湯主之此亦虛冷霍亂之候四肢拘急手足厥逆虛冷之著於外也下利清穀脈微欲絶虛冷之著於內也虛冷甚於內則反逼其陽於外矣故其外候每多假熱之象或煩躁去衣而欲坐地或面赤喜冷而不欲咽或脈大虛弦而不住按是皆元氧耗散虛陽失守甚加喘噦最為危險唯四逆湯可以驅內勝之陰而復外散之陽但小便復利下利清穀八字最宜著眼靈胎所謂一證不具即當細審也倘熱霍亂因暑邪深入而滯其經隧顯脈細肢寒之假象者必有溺赤便臭之真諦臨證慎毋忽焉又云吐下已斷汗出而厥四肢拘急脈微欲絶者通脈四逆加豬膽汁湯主之尤在涇曰吐下已止陽氣當復陰邪當解乃汗出而厥四肢拘急而又脈微欲絶則陰無退散之期陽有散亡之象於法為較危矣故於四逆加乾薑一倍以救欲絶之陽而又慮溫熱之過反為陰氣所拒而不入故加豬膽汁之苦寒以為響導之用即內經盛者從之之意也又云吐利止而身痛不休者當消息和解其外宜桂枝小和之如吐利止里已和也身痛不和者表未解也故須桂枝和解其外所謂表病里和汗之則愈也但此為寒霍亂之兼有風寒表邪者而言熱霍亂後之表不解者不得妄引此例王孟英制駕輕湯最為合治然其意亦不敢出仲聖之範圍也詳其一日消息再曰小和之者蓋以吐利之餘裡氣已傷故必消息其可汗而汗之亦不可大汗而可小和之也況彼熱霍亂之後津液尤虛其可妄施汗法乎此孟英之所以但以輕清為制也又云少陰病吐利手足厥冷煩躁欲死者吳茱萸湯主之少陰病吐利煩躁四逆者死王孟英曰寒中少陰吐利交作陰邪盛極而陽氣不勝也然先厥冷而後煩躁猶有陽欲復而來爭之兆故以吳茱萸溫里散寒人參大棗益氣安中為治也若先煩而後四逆者陽不勝而將絶也故死此二條本少陰中寒非霍亂也然既明霍亂之治不得不列其類證蓋恐後人遇此等病亦以霍亂法施之即仲聖列霍亂於傷寒論之意耳列方理中丸傷寒論治寒霍亂口不渴者人參甘草乾薑白朮為末蜜丸亦可水煎作湯服合五苓散名理苓湯附子理中丸同上治證如前而寒甚者前方加附子一味四逆湯同上治陰熱霍亂汗出而四肢拘急小便復利脈微欲絶而無頭痛口渴者甘草乾薑附子水煎服通脈四逆加豬膽汁湯同上治陰寒霍亂愈後四肢拘急脈微欲絶者乾薑甘草附子豬膽汁和入水煎服五苓散同上治霍亂吐瀉口渴欲飲水頭疼身痛發熱者豬苓澤瀉桂茯苓白朮為末白湯和服合平胃散名胃苓湯按此仲聖治熱霍亂之兼有風寒表邪之方也然隅反化裁在人善用如證與本條適合者方中當用桂枝若內伏暑濕之邪而又過食生冷者方中當用肉桂其外無風寒之表內無飲冷傷中則桂可輕用哉此石頑之所以示戒而河間之所以加三石吳氏之所以有四苓也苟能因此而引伸其義則無窮活法皆可心領而神悟矣桂枝湯同上治寒霍亂後身猶痛者桂枝芍藥甘草生薑大棗水煎服厚朴生薑半夏甘草人參湯同上治虛寒挾濕之霍亂吐利藥即湯見孟英曰古今治霍亂者從未論及此方豫每用之以奏奇績吳茱萸湯同上治少陰吐利厥逆煩躁亦治厥陰寒犯陽明食谷即嘔之證吳茱萸人參生薑大棗水煎服漿水煎潔古治陰寒霍亂暴瀉如水汗多身冷氣少脈沉或脫者桂枝乾薑附子甘草良薑為末每服三五錢地漿水煎服大順散局方治襲涼飲冷陰寒抑遏陽氣而成霍亂水穀不分脈沉而緊者甘草乾薑杏仁桂枝上炒如法為末每服二三錢湯和服冷香飲子治陰寒霍亂脈沉細或弦緊無汗惡寒面如塵土四肢厥逆陽氣大虛之證附子陳皮甘草草果生薑水煎一滾即濾井水浸冷服七香飲治七情鬱結寒食停滯而成霍亂者烏藥香附枳殼厚朴木香陳皮紫蘇水煎服神香散景嶽治乾霍亂腹痛之屬於寒濕凝滯脈絡者丁香七粒白豆蔻七粒為末清湯調下小腹痛者加砂仁七粒王晉三曰此方治寒濕痧脹有神功與益元散治濕熱痧脹可謂針鋒相對灸法治陰寒霍亂以鹽填臍內上蓋蒜片安艾炷而灸之外臺法以手拗所患腳大拇指當腳心急筋上七壯急筋即屈伸不利而拘急也喻氏法凡卒中陰寒厥逆吐瀉色清氣冷凜栗無汗者用蔥一大握以帶緊束切去兩頭留白寸許以一面尉熱安臍上用尉斗盛炭火尉蔥白上面取其熱氣從臍入腹甚者連尉二三餅又甚者再用艾炷灸關元氣海各二三十壯若腠理素疏陰盛逼陽而多汗者用附子乾薑回陽之不暇尚可尉灼以助其散越乎王孟英曰讀仲聖傷寒論乃知病屬陰虛血少者概不可灸必陽虛氣弱者始可用灸而嘉言復辨陽虛者固可以灸若陽虛至於外越者豈容再灸可謂發前人之未發足補長沙之未及也世之不別陰陽而妄施灼灸以傷人者豈特霍亂為然乎籲可嘆已附暖臍方霍亂一症皆由寒邪鬱結氣閉不通因而吐瀉交作至於多利亡陰血液枯涸則筋脈攣急手足拘牽即俗名吊腳痧也此症朝發夕死夕發朝死無論藥力不及即重用猛烈之品而熱劑劫陰終於不救此散藥雖峻猛而由臍納入自能溫通臟腑不致傷陰屢試屢驗識者珍之上猺桂心八錢去皮母丁香一兩二分硫黃五錢生香附一兩八錢當門子四錢上藥共研極細末每用三分納入肚臍中外用膏藥封貼一時即愈藥性猛烈斷不可吃孕婦忌用補方藿香正氣散局方治內停生冷外感風寒之霍亂亦主水土不服之病藿香半夏甘草紫蘇茯苓厚朴陳皮桔梗白芷蒼朮一本作大腹皮為末每服三五錢水煎服若溫暑熱證不兼寒濕者禁用林按藿香正氣散溫散之劑也誤施於熱霍亂必增煩躁面赤揭衣臥地等證而況動輒即投丁附薑桂者當見下咽無不昏沉厥冷渾身青紫而死猶謂陰盛已極如此大熱尚不克救而死者含冤籲可嘆也六和湯同上治夏月虛人濕熱內伏而傷生冷外感風寒之霍亂吐瀉寒熱交作香薷半夏砂仁人參扁豆赤苓藿香厚朴杏仁甘草木瓜香薷飲同上治暑月乘涼飲冷陽氣為陰氣所遏頭痛發熱惡寒煩躁口渴腹滿之霍亂香薷厚朴扁豆水煎冷服十味香薷飲同上治虛人伏濕復兼感冒食滯而成霍亂者宜此方加減治之香薷人參白朮廣皮茯苓厚朴黃蓍扁豆甘草木瓜水煎服本方去參蓍加藿香蘇葉名消暑十全散治夏月久傷生冷復重感風寒而成霍亂者雞矢白散金匱治轉筋入腹雞矢白雄雞矢乃用白臘月收干之水煎濾清汁服蔥豉湯肘後治霍亂髮斑蔥白一握香豉三合水煎和童便服蘆根湯千金治霍亂煩悶蘆根麥冬水煎服或與竹葉同煎桂苓甘露飲河間治暑熱挾濕之霍亂茯苓白朮豬苓滑石凝水石肉桂甘草澤瀉石膏為末每服三錢水調下桂苓白朮散即本方去豬苓加人參也黃芩湯傷寒論治溫病變霍亂之主方黃芩炙草芍藥大棗水煎服黃芩加半夏生薑湯原方加半夏生薑半夏厚朴湯一名四七湯金匱治情志不舒痰濕阻氣而成霍亂者半夏厚朴茯苓蘇葉姜水煎服按此方既主七情不適之郁痰證亦治寒濕不化風感外侵食滯不消誤投滋膩因而病劇者無不所向輒捷麥門冬湯同上治霍亂後餘熱未清神倦不飢無苔而渴或火升氣逆乾咳無痰麥冬半夏人參甘草粳米大棗水煎服按海藏以竹葉易半夏治溫熱後房勞復之氣欲絶者大效即不房勞復而氣液兩虧不能受重劑峻補皆可以此湯接續其一線之生機附子粳米湯同上治中寒霍亂肢冷腹痛吐少嘔多者附子半夏炙草大棗粳米水煎服來復丹局方治上盛下虛裡寒外熱伏暑夾陰吐瀉霍亂危證太陰元精石硝石小青皮舶上硫黃廣橘紅五靈脂為末古法以醋丸今易米飲為丸異功散錢氏治霍亂後中虛主劑人參白朮茯苓炙草橘紅水煎服雪羹湯治暑熱霍亂吐瀉口渴氣逆煩躁眩暈等症陳海蛇四兩浸洗極淡鳧茈二兩切即荸薺水煎至蛇煬盡溫服代茶亦可專治霍亂轉筋方聖惠原蠶沙一兩陰陽水煎澄清溫服按蠶沙乃桑葉所化夫桑主息風化濕既經蠶食蠶亦主勝風去濕且蠶僵而不腐得清氣於造物者獨純故其矢不臭不變色殆桑後蠶化雖走濁道而清氣獨全金匱以雞矢治霍亂轉筋者雞屬巽雖不溺而矢獨干亦取少勝風濕以領濁氣下趨也蠶沙既引濁下趨又能化濁使之歸清性較雞矢更優故余以為霍亂轉筋之主藥頗奏膚功嗣見治痧飛龍奪命丹用人中白一味領諸藥迅歸濁邪下趨陰竅較他方之藉硝以達下者更覺貼切故奏效尤捷制方之義可謂精矣至來復丹之用五靈脂亦從雞矢白脫胎也枇杷葉去毛濃煎徐飲此方不但解霍亂之渴也若深冬採之刷毛洗淨切碎淨鍋炒乾瓷瓶密收常以代茗可杜暑濕時疫及噎厄諸病生芋一片垂危者放入病人口內咽汁即蘇蘇後再吃幾片取其寬腸去垢濁破血清痧毒也世傳飲油吞礬二方取其引吐澄濁也油滋膩礬兒澀皆有流弊不如生芋也普洱茶濃煎溫服西瓜汁治霍亂轉筋大渴苔黃汗頻無溺者按凡陽氣遏抑在內雖熱證而無汗西瓜汁慎用
