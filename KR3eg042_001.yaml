body:
  text: 卷上霍亂證無論四肢厥冷畏寒舌白一派陰寒氣象畢呈顯露若服丁附薑桂等藥則百無一生者矣須知霍亂總以暑熱而成有熱極似寒者即假寒也所以徐靈胎有寒霍亂百不得一之説霍亂非輕小證也然治之偶合古法竟有不藥而霍然者如飲水單方刮刺之類霍亂有稱為吊腳痧者即霍亂之劇而轉筋者原非另有一證也霍亂有呼為絞腸痧者即乾霍亂也按方書自古以來從無痧證之名殆不知始於何時也至醫説始載葉氏用蠶退紙治痧之法而江民瑩誤為解亦證雖為杭堇浦所譏然亦可見從前痧證不多故古人皆略而不詳也逮國初時其病漸盛自北而南所以又有滿洲病與番痧之名郭右陶著痧脹玉衡一書推原極變其説甚説而痧之證治乃備張路玉復分臭毒番痧為二者蓋謂惡氣更毒於穢氣也王晉三又辨痧即外邪驟入阻塞其正氣流行之道之謂而痧之病義益明至情志多郁之人稍犯涼熱即能成痧且不時舉發亦由氣血失其宣暢也若干霍亂則亦有不因痰濕飲食之滯但為暑暍之氣擾亂於中者當以新汲水地漿等治之耳霍亂舉世皆名為痧證也王晉三曰痧者寒熱之濕氣皆可以為患或四時寒濕凝滯於脈絡或夏月濕熱鬱遏於經隧或鼻聞臭氣而阻逆經氣或內因停積而壅塞腑氣則胃脘氣逆皆能脹滿作痛甚至昏憒欲死西北人以楊柳枝蘸熱水鞭其腹謂之打寒痧東南人以油碗或油線括其胸背手足內胻謂之刮痧以碗鋒及扁針刺舌下指尖及曲池委中出血謂之搠痧更服玉樞丹以治其內是皆內外達竅以泄其氣則氣血得以循度而行其脹即已實即霍亂耳非另有痧邪也霍亂有先吐瀉而心腹絞痛者從穢氣而發者多先心腹絞痛而吐瀉者從暑氣而發者多郭右陶之説也瀛按霍亂有吐瀉並作有吐而不瀉有瀉而不吐有先吐後瀉有先瀉後吐總不外內停飲食外感暑穢而鬱阻中宮賊胃則先吐賊脾則先瀉故先心痛者則先吐先腹痛者則先瀉心腹俱痛吐瀉交作矣然吐瀉之霍亂乃暑穢傷人氣分宜用油鹽刮其皮膚則痧不內攻若心胸脹悶腹中絞痛或如板硬或如繩縛或如筋吊或如錐刺刀割雖痛極而不吐瀉者名乾霍亂乃邪已入營宜以針刺出血則毒有所泄然後再審其因而藥之若痧脹已極難於刮刺者又必先以藥救醒乃可以回生明此三法庶可十全霍亂有素多濕滯而犯臭氣則正氣鬱遏腹痛乃作或上連頭額俱痛或下連腹腿俱痛有痛死不知人少間復蘇者有腹痛不時上攻水漿不入數日不已者甚至欲吐不吐欲瀉不瀉或四肢厥逆面青脈伏或遍體壯熱面紫脈堅但與生黃豆嚼之覺香甜者是臭毒也急以燒鹽探吐或以童便制香附四五錢為末煎湯頓服最效世俗有用水搭肩背及臂者有以苧麻水濕刮之者有以瓷碗油潤刮之者有以瓷鋒針刺委中出血者總欲使腠理開通之意耳其脈多伏或細小緊澀或堅徑搏指中帶促結皆是陰逆陽伏之象不可誤認陰寒而投以丁附薑桂雖砂仁之辛溫香竄亦不可輕用若見面青唇黑脈徑搏指厥逆喘促多不可救也霍亂以脾土濕盛而滯其升降之機則濁反厥逆於上清反抑陷於下雖有熱化寒化之分必以治中焦之濕為要領也瀛按靈樞曰清氣在陰濁氣在陽清濁相干則為霍亂蓋因暑穢之氣鬱滯中焦使脾土阻而不能運動氣隧遏而不得舒居中既隔滯勢必上逆為吐下奔為瀉苟不急治中焦之濕則頃刻間三焦皆邪陰陽乖舛而病益劇矣霍亂者揮霍悶亂成於頃刻變動不安之謂邪在上則吐邪在下則利邪在中焦上逆而為嘔吐復下注而為利者若久病上不能納下不能禁名曰吐利不得謂之霍亂也霍亂頭痛發熱身疼霍亂之表症也而有寒熱之分者以中焦上位乃陰陽之交而無一定之性從陰化則為寒每因寒涼而病始發冬月多有之從陽化則為熱因暑熱而病始發夏秋多有之然因寒者口必不渴稍渴者必屬於熱仲景云下利欲飲水者以有熱故也瀛按傷寒論有熱多欲飲水寒多不用水之文此言外感之證有熱多寒多之辨蓋外感熱邪入里已多所以口渴而喜飲也霍亂之發每因吸受暑穢或飲食停滯遂至清濁相干亂於腸胃而為上吐下瀉治宜宣土鬱而分陰陽祛暑穢而行食滯土鬱者中焦濕盛而升降之機乃窒諸郁之發皆從熱化也霍亂系因熱而成者經云不遠熱則熱至熱至則身熱吐下霍亂奈病源三因等書咸謂霍亂無不本之風冷遂致薛立齋張介賓輩專主於寒從此印定後人眼目凡患熱霍亂者皆被此數公殺之矣如勞役田野之間則暑熱自外而入矣或安享膏粱之奉則濕熱自內而生矣是以不遠熱三字亦非但以藥食為言也霍亂一證每發於夏秋之間者正以濕土司氣而從熱化耳若其人中陽素餒己土不勝濕而復襲涼飲令則濕從寒化而成霍亂者亦有之然熱化者天運之自然寒化者他氣之所逆知常知變庶可以治霍亂焉霍亂屬熱內經文也劉守真云三焦為水穀傳化之道路熱氣甚則傳化失常而吐利霍亂火性躁動故也奈薛立齋之流敢以寒多立論貽誤後世未窺至理遠不如徐氏百不得一之識見耳霍亂有身熱煩渴氣粗喘悶而兼厥逆躁擾者傷暑也慎勿認作陰證但察其小便必黃赤舌苔必黏膩或白厚宜王孟英所制然照湯澄冷服一劑即現熱象此時若投丁附薑桂等藥轉見渾身青紫而死矣甚有手足厥冷少氣唇面爪甲皆青腹痛自汗六脈俱伏而察其吐出酸穢瀉下臭惡便溺黃赤者是熱伏厥逆也熱極似陰瀛按至真要大論諸嘔吐酸皆屬於熱諸逆衝上皆屬於火是也急作地漿煎竹葉石膏湯服之又有吐瀉後身冷如冰欲沉欲絶湯藥不下或發噦亦是熱伏於內醫不能察投藥稍溫愈服愈吐驗其口渴以涼水與之即止後以駕輕湯投之脈漸出者生然暑之為病傷之驟者則發之暴傷之不漸者則發之緩故九月時候猶多伏暑霍亂之證霍亂以暑氣入腹噁心腹痛上吐下瀉瀉如水注張鳳逵曰春分以後秋分以前少陽相火少陰君火太陰濕土三氣合行其政故天之熱氣下地之濕氣上人在氣交之中受其蒸淫之氣由口鼻入而擾其中遂致升降失司清濁不分所瀉者皆五臟之津液急宜止之非通因塞用之謂也濕甚者胃苓湯分利陰陽暑亦自去熱甚者桂苓甘露飲清其暑火濕亦潛消若火甚之體內本無濕而但吸受暑邪者白虎湯之類宜之蓋臟性有陰陽之別陰虛者火旺雖病發之時適犯生冷而橘朴等僅宜暫用陽虛者濕勝雖寒潤之品非其所宜如胃苓湯已為合法縱或體氣極弱亦不過補氣清邪並用若因其素秉之虛而忘其現病之暑進以丁附薑桂之劑真殺人不轉睫矣霍亂之轉筋尤在涇曰肝主筋上應風木肝病生風則為轉筋其人臂腳直脈上下行微弦經云諸暴強直皆屬於風也轉筋入腹者脾土虛而肝木乘之也按薛一瓢以轉筋與痙證同推義亦本此原病式云轉反戾也熱氣燥爍於筋則攣瘛而痛火主燔灼躁動故也瀛按內經云諸轉反戾皆屬於火是也或以為寒客於筋者誤也蓋寒主收引然止為厥逆禁固屈伸不利安得為轉也所以轉者動也陽動陰靜熱證明矣夫轉筋者多由熱甚霍亂吐利所致以脾胃土衰則肝木自盛而熱爍於筋故轉筋也夫發渴則為熱凡霍亂轉筋而不渴者未之有也張路玉曰嘔吐泄瀉者濕土之變也轉筋者風木之變也濕土為風木所克則為霍亂轉筋平胃散加木瓜主之有一毫口渴即是伏熱種種燥熱之藥誤服即死雖五苓散之桂亦宜酌用仲聖雖立熱多欲飲水者五苓散主之之法然上文有頭痛惡寒之表證所以仍取兩解之義是桂枝原為兼有風寒者而設故雖兼表證而非風寒之邪或本無表證而內熱甚者豈可拘泥成法不知變通而徒藉聖人為口實哉凡霍亂轉筋脈為兼弦正以木旺而侮其所勝也濕盛者平胃散加木瓜可矣火盛者木瓜湯送左金丸為宜王孟英因雞矢白散之意而立蠶矢湯一方屢收奇績矣霍亂又有感惡毒異氣所致者即張路玉所謂番痧證也卒然昏倒腹痛面色黑脹不呼不叫如不急治兩三時即斃腹痛麻瞀嘔惡神昏者或濈濈汗出或隱隱發斑此毒邪焮發於表也有發即瀉利厥逆腹脹無脈者此毒邪內伏也所患最暴多有不及見斑而死者初覺即以蕎麥焙燥去殼取末三錢溫湯調服重者少頃再服即安蓋蕎麥能煉腸胃滓穢降氣寬胸而治濁滯而痧毒之專藥其毒甚面黑者急砭委中穴去黑血以泄毒邪蓋驟發之病勿慮其虛非此急奪束手待斃倘無蕎麥或服之不應即宜理氣為先如香蘇散加薄荷荊芥辛涼透表次則辟邪為要梔子豉湯加牛蒡生甘草解毒安中表熱勢甚清熱為急黃芩湯加連翹木通分利陰陽斑點深赤急用茺蔚湯下其血分之毒如見煩擾腹脹脈來數疾急投涼膈散如局方以竹葉易生薑則毒從下奪熱劇神昏雖合三黃多不可救煩渴引飲遺尿速清陽明白虎湯加蔥豉使毒從表化以上諸法在未經誤藥庶可挽回一二列方地漿千金治乾霍亂及霍亂轉筋掘黃土地作坎深三尺以新汲井水沃入攪濁少頃取清飲三五盞即愈大忌米湯羅謙甫曰霍亂乃暑熱內傷七神迷亂所致陰氣靜則神藏躁則消亡非至陰之氣不愈坤為地屬陰土曰靜順地漿作於陰地坎中為陰中之陰能瀉陽中之陽也王孟英謂得羅氏此言治霍亂已思過半矣蔣式玉稱其勤求古訓信不誣也按霍亂因無形之邪由口鼻吸入肺胃之絡而阻其氣道之流行乃否塞不通之病或清不能升而泄瀉無嚏濁不能降而腹痛嘔吐故用藥皆以清涼宣暢為法凡周時內一口米湯下咽即脹逆不可救者蓋以穀氣入胃長氣於陽況煎成湯液尤能閉滯經絡也蓋湯熱湯飲酒澡浴並忌者為其能助熱氣上衝也若吐瀉既多元氣耗散內已無邪者須以清米湯涼飲之以為接續不可禁之太過而反致胃氣之難復也陰陽水本草綱目治霍亂吐利新汲水百沸湯各半和服李瀕湖曰上焦主納中焦主腐下焦主出三焦通利陰陽調和升降周流則臟腑暢達一失其道二氣淆亂濁陰不降清陽不升故發為霍亂吐利之病飲化即定者分其陰陽使得其平也冬瓜湯王孟英治霍亂大渴冬瓜去皮瓤水煎清湯俟涼任意飲之按永類鈴方用陳倉米作湯今改用冬瓜湯其功更勝蓋陳倉米雖能清熱霍亂平後用之頗為得宜若邪勢方張吐下未平之際服之猶嫌其守惟冬瓜甘淡微涼極清暑熱無論病前病後用以代飲妙不可言即溫熱病用之亦良救急良方外臺治暑熱霍亂吐瀉轉筋新汲水以一碗冷飲之外以一盆盛水浸兩足忌食熱物療霍亂代穀食方蕎麥焙燥去殼磨粉不拘多少上沸湯調熟候溫服之蓋蕎麥性能煉腸胃滓穢降氣寬胸而治濁滯為痧毒之專藥也瀛按楊氏簡便方絞腸痧痛用蕎麥麵一撮妙黃水煎服李時珍亦曰炒焦熱水沖服治絞腸痧庭按方書蕎或作荍詩陳風視爾如荍毛傳云荍芘瞥也爾雅荍蚍衃郭注云今荊葵也似葵紫色謝氏云小草多華少葉葉又翹起邢疏舍人云荍一名蚍衃陸璣云荊葵似蕪菁華紫緑色可食微苦本草載蕎麥莖弱而翹然易長易收磨如麥面又白居易詩云蕎麥鋪花白是也金莖露顧聖符治霍亂轉筋扁豆葉一握搗絞汁一碗飲瀛按扁豆葉別録曰治霍亂吐下不止蘇恭亦曰吐利後轉筋用生扁豆葉一把搗汁入酢服立瘥葉天士種福堂霍亂門中亦選此方傷暑霍亂方包瑞溪冬瓜葉一斤白霜梅肉一錢並核中仁用研爛新汲水調服立瘥處治轉筋方轉筋起於足腓俗呼腿肚但以好燒酒摩擦其硬處軟散即愈一法作極鹹鹽湯於槽中暖漬之一法以省頭草同炒鹽擦之亦良一法以棉絮浸酒中煎滾取出乘熱裹之一法以醋煮青布掩腳膝冷復易之一法令病人偃臥將膝腕內以手蘸溫水輕輕急拍直待紫紅筋現起即郭右陶所謂痧筋用瓷鋒刺出血立愈並治乾霍亂此名委中穴在膝後對面刮法郭右陶治霍亂痧脹乾霍亂背脊頸骨上下及胸前脅肋兩背肩臂用銅瓷蘸香油刮之或用刮舌刡子腳蘸香油刮之頭額腿上用棉線或麻線蘸香油刮之大小腹軟肉處用食鹽以手擦之按張會卿曰凡毒深病急者非刮背不可蓋以五臟之系咸附於背也又須自輕而重向下刮之則邪氣亦隨之而降矣刺法同上治乾霍亂痧脹嘗覽古人遺書東南卑濕之地利用砭今以針刺出血即用砭之道也凡霍亂痧脹邪已入營必有青筋紫筋或現於數處或現於一處須用銀針刺之去其毒血然後據證用藥看其腿彎上下有細紫深青色或紫色或深紅色者肌膚白嫩者方有紫紅色即是痧筋刺之方有紫黑毒血其腿上大筋不可刺刺亦無毒血反令人心煩腿兩邊硬筋上筋不可刺刺之恐令人筋吊若臂彎筋色亦如此辨之其餘非親見不明白故不具載至如頭頂心一針惟取挑破略見微血以泄痧毒之氣而已不可直刺其指尖刺之太近指甲雖無大害當令人頭眩即一應刺法不過針鋒微微入肉不必深入按乾霍亂因毒邪入於營分周身隧絡為之壅塞故又謂之痧脹失治即死唯用針刺砭去惡血取效最捷益母草萊蔔汁之治番痧皆取其能散惡血也即古方探吐以燒鹽和熱童便雖云性專潤下亦為其涼血之功有獨擅耳唯腹雖痛極而喜得溫按唇口刮白者乃內虛陰寒之病慎毋誤用清涼妄施針刺而遺人夭殃也茺蔚湯治乾霍亂腹痛驟發深赤斑毒俗呼為番痧益母草以水濃煎少投生蜜或可不用燉溫恣服取效或加生萊蔔汁半杯良燃照湯孟英治暑穢挾濕霍亂吐下脘痞煩渴外顯惡寒肢冷者草果仁淡豆豉醋炒半夏佩蘭草製厚朴黑山梔酒炒黃芩滑石水煎涼服連朴飲同上治濕熱內伏之霍亂兼能行宿食滌痰涎川連醋炒半夏香豉川朴石菖蒲黑山梔水煎服梔子豉湯傷寒論治暑熱霍亂之主劑兼解暑證誤服附桂而致殆者梔子香豉水煎服按此傷寒吐劑也王孟英治熱霍亂獨推以為主劑蓋梔子苦寒善泄鬱熱豉經熱腐性格和中凡霍亂皆由濕鬱化熱而擾攘於中宮唯此二物最為對症良藥奈昔人咸未之察也且二物之奇匪可言罄如偶以竹葉清暑風配以蔻仁宣穢惡濕甚者臣以滑朴熱勝者佐以芩連同木瓜扁豆則和中合甘草鼠黏而化毒其有誤投熱藥而致躁亂昏沉者亦必藉此以為解救厥功懋矣而古人之治霍亂者從不録用豈非一大關典耶六一散即益元散又名天水散河間治暑熱霍亂滑石甘草為粉水飛每服三錢新汲水下左金丸丹溪治霍亂轉筋火邪內熾黃連吳茱萸為末米飲為丸如梧子大每服三錢以陳木瓜五錢煎湯下此證因濕盛而風木行脾者石頑主平胃散加木瓜矣若熱勝而火爍於筋者孟英獨推是方為妙張雨農極為首肯云嘗在京師見社石樵少宰亦以此藥救活多人也然昔賢皆未採用何左金丸之蹇於遇乎蠶矢湯孟英治霍亂吐利轉筋腹痛口渴煩躁危急之症晚蠶沙川連大豆卷酒炒黃芩苡仁木瓜吳茱萸醋炒半夏黑山梔通草以陰陽水煎稍涼徐徐服之解毒活血湯同上治溫者痧邪深入營分轉筋吐下肢厥汗多脈伏溺無口渴腹痛面黑目陷勢極可危之證連翹淡紫菜川連益母草生苡仁絲瓜絡石菖蒲蠶沙地丁銀花水煎入生藕汁或茅根汁或加白童便黃芩定亂湯同上治溫病轉為霍亂腹不痛而肢冷脈伏或肢不冷而口渴苔黃小水不行神情煩躁黃芩黑山梔醋炒半夏蒲公英蠶沙淡豆豉陳皮川連吳萸陰陽水煎服轉筋加生苡仁絲瓜絡溺行者加木瓜濕盛者加連翹茵陳昌陽瀉心湯同上治霍亂後胸前痞塞湯水礙下或渴或厄石菖蒲半夏川連竹茹蘆根蘇梗汁黃芩川朴枇杷葉水煎服如小溲祕澀者加紫苑按昌陽者能掃滌濁邪而昌發清陽之氣駕輕湯同上治霍亂後餘邪不清身熱口渴及熱邪內伏身冷脈沉湯藥不下而發厄鮮竹葉黑山梔金石斛省頭草冬桑葉淡豆豉生扁豆陳木瓜水煎服致和湯同上治霍亂後津液不復喉乾舌燥小水短赤北沙參枇杷葉生扁豆木瓜陳倉米麥冬鮮竹葉生甘草金石斛水煎服黃連香薷飲活人治暑熱霍亂黃連香薷厚朴水煎服按若夏月無表證者切勿誤服香薷以疏衛氣而貽暑患木瓜湯聖惠方治霍亂轉筋腹痛木瓜一兩水煎服余湯浸青布裹其腓本方加桑枝五錢尤良外臺方用木瓜子根皮食前湯服扁豆散普濟方治霍亂吐利生扁豆為末入少醋冷水和服按木瓜扁豆皆治霍亂之生藥也於此二方可見瀛按扁豆李時珍曰通利三焦能升清降濁故專治中宮之病消暑除濕而能解毒千金方有扁豆香薷各一升水六升煮二升分服治霍亂吐利之方藕汁聖惠方治霍亂吐利生藕搗汁服瀛按聖濟總録治霍亂煩渴用藕汁一盅生飲陶隱居孟同州皆謂藕之功用在乎破血故也柳州方柳子厚治乾霍亂不得吐瀉甚至冷汗出而氣欲絶者鹽一撮放刀上用火炙透以熱童便和服少頃即得吐下而氣通矣按此方極易極效真神劑也或用新汲水和服亦可白虎湯傷寒論治暑火熾盛而霍亂者石膏知母甘草粳米水煎米熟湯成去渣服按治霍亂宜用陳倉米人參白虎湯同上治證如前而元氣已虛者宜此前方加人參一味竹葉石膏湯同上治體虛受暑霍亂吐瀉及暑邪深入等證竹葉人參半夏粳米石膏麥冬甘草水煎服此方治熱極似陰之霍亂用地漿水煎更妙四苓散瘟疫論治濕熱霍亂胸悶溺澀而渴者茯苓豬苓澤瀉陳皮水煎服按吳氏於五苓方去桂而治胃中濕熱最為有見且以橘皮易術則無實中之弊而有利氣之功當變而變可謂善用古人之法矣平胃散局方治濕熱內甚霍亂吐瀉蒼朮厚朴橘紅甘草為末每服七錢水煎加木瓜治轉筋霍亂按此方專治濕重熱伏之證故多香燥
